<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Iris Reply</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 20px;
      font-size: 14px;
    }
    h1 { font-size: 20px; margin-bottom: 16px; color: #fff; }
    h2 { font-size: 16px; margin: 20px 0 12px; color: #ccc; }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      color: #888;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: #6c8aff; border-bottom-color: #6c8aff; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .toolbar select, .toolbar button, .toolbar input {
      background: #1e2030;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar input { width: 200px; }
    .toolbar button:hover { background: #2a2d42; }
    .toolbar select:focus, .toolbar button:focus, .toolbar input:focus { outline: none; border-color: #6c8aff; }

    .btn-primary {
      background: #2a4a6b !important;
      border-color: #3a6a9b !important;
    }
    .btn-primary:hover { background: #3a5a8b !important; }
    .btn-danger {
      background: #4a2a2a !important;
      border-color: #7a3a3a !important;
    }
    .btn-danger:hover { background: #5a3a3a !important; }
    .btn-success {
      background: #2a4a2a !important;
      border-color: #3a7a3a !important;
    }
    .btn-success:hover { background: #3a5a3a !important; }

    .stats-disabled {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .stats-disabled p { margin-top: 12px; font-size: 13px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #222;
      white-space: nowrap;
    }
    th {
      color: #999;
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
    }
    tr:hover td { background: #1a1c2e; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-on { background: #1a3a2a; color: #4ade80; }
    .badge-off { background: #3a1a1a; color: #f87171; }
    .badge-reply { background: #1a3a2a; color: #4ade80; }
    .badge-skip { background: #3a2a1a; color: #fbbf24; }
    .badge-drift { background: #3a1a2a; color: #f87171; }
    .badge-passive { background: #1a2a3a; color: #60a5fa; }
    .badge-idle { background: #222; color: #888; }
    .badge-cooldown { background: #3a2a1a; color: #fbbf24; }
    .badge-following { background: #1a2a3a; color: #60a5fa; }

    .willingness-low { color: #f87171; }
    .willingness-medium { color: #fbbf24; }
    .willingness-high { color: #4ade80; }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #333;
      border-radius: 22px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: #888;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider { background: #2a5a2a; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); background: #4ade80; }

    .willingness-select {
      background: #1e2030;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .willingness-select:focus { outline: none; border-color: #6c8aff; }

    .action-btn {
      background: #1e2030;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      margin-left: 4px;
    }
    .action-btn:hover { background: #2a2d42; }
    .action-btn.danger { color: #f87171; border-color: #5a2a2a; }
    .action-btn.danger:hover { background: #3a2020; }

    .log-entry {
      background: #161825;
      border: 1px solid #222;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
    }
    .log-header:hover { background: #1e2030; }
    .log-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }
    .log-time { color: #888; font-size: 12px; }
    .log-detail {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid #222;
    }
    .log-detail.open { display: block; }
    .log-detail pre {
      background: #0d0e16;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 10px;
      margin-top: 8px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-detail label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      color: #888;
      font-size: 12px;
      font-weight: 600;
    }
    .log-detail label:first-child { margin-top: 0; }

    .empty { color: #666; text-align: center; padding: 30px; }
    .loading { color: #888; text-align: center; padding: 30px; }

    .pagination {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin-top: 16px;
    }
    .pagination button {
      background: #1e2030;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .pagination button:disabled { opacity: 0.4; cursor: default; }
    .pagination span { color: #888; font-size: 13px; }

    .duration { color: #888; font-size: 12px; }

    .add-group-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }
    .add-group-row input {
      background: #1e2030;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      width: 240px;
    }
    .add-group-row input:focus { outline: none; border-color: #6c8aff; }
    .add-group-row input::placeholder { color: #666; }

    .muted { color: #666; font-size: 12px; }

    .config-section {
      background: #161825;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .config-section h3 {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #222;
    }
    .config-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .config-row label {
      flex: 0 0 220px;
      font-size: 13px;
      color: #ccc;
    }
    .config-row .config-hint {
      flex: 0 0 200px;
      font-size: 11px;
      color: #666;
    }
    .config-row input[type="number"],
    .config-row input[type="text"] {
      background: #1e2030;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      width: 100px;
    }
    .config-row input:focus { outline: none; border-color: #6c8aff; }
    .config-sub-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .config-sub-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .config-sub-item span {
      font-size: 12px;
      color: #888;
    }
    .config-sub-item input {
      width: 60px !important;
    }
    .config-save-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }
    .config-msg {
      font-size: 13px;
      color: #4ade80;
    }
    .config-msg.error { color: #f87171; }
  </style>
</head>
<body>
  <h1>Iris Reply</h1>
  <div class="tabs">
    <div class="tab active" data-tab="manage">群聊管理</div>
    <div class="tab" data-tab="stats">统计监控</div>
    <div class="tab" data-tab="settings">设置</div>
  </div>
  <div id="tab-manage" class="tab-content active">
    <div class="loading">加载中...</div>
  </div>
  <div id="tab-stats" class="tab-content">
    <div class="loading">加载中...</div>
  </div>
  <div id="tab-settings" class="tab-content">
    <div class="loading">加载中...</div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
