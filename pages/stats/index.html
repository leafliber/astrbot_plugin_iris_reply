<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Iris Reply Stats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 20px;
      font-size: 14px;
    }
    h1 { font-size: 20px; margin-bottom: 16px; color: #fff; }
    h2 { font-size: 16px; margin: 20px 0 12px; color: #ccc; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .toolbar select, .toolbar button {
      background: #1e2030;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #2a2d42; }
    .toolbar select:focus, .toolbar button:focus { outline: none; border-color: #6c8aff; }

    .stats-disabled {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .stats-disabled p { margin-top: 12px; font-size: 13px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #222;
      white-space: nowrap;
    }
    th {
      color: #999;
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
    }
    tr:hover td { background: #1a1c2e; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-reply { background: #1a3a2a; color: #4ade80; }
    .badge-skip { background: #3a2a1a; color: #fbbf24; }
    .badge-drift { background: #3a1a2a; color: #f87171; }
    .badge-passive { background: #1a2a3a; color: #60a5fa; }
    .badge-idle { background: #222; color: #888; }
    .badge-cooldown { background: #3a2a1a; color: #fbbf24; }
    .badge-following { background: #1a2a3a; color: #60a5fa; }

    .willingness-low { color: #f87171; }
    .willingness-medium { color: #fbbf24; }
    .willingness-high { color: #4ade80; }

    .log-entry {
      background: #161825;
      border: 1px solid #222;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
    }
    .log-header:hover { background: #1e2030; }
    .log-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }
    .log-time { color: #888; font-size: 12px; }
    .log-detail {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid #222;
    }
    .log-detail.open { display: block; }
    .log-detail pre {
      background: #0d0e16;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 10px;
      margin-top: 8px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-detail label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      color: #888;
      font-size: 12px;
      font-weight: 600;
    }
    .log-detail label:first-child { margin-top: 0; }

    .empty { color: #666; text-align: center; padding: 30px; }
    .loading { color: #888; text-align: center; padding: 30px; }

    .pagination {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin-top: 16px;
    }
    .pagination button {
      background: #1e2030;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .pagination button:disabled { opacity: 0.4; cursor: default; }
    .pagination span { color: #888; font-size: 13px; }

    .duration { color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Iris Reply 统计监控</h1>
  <div id="content">
    <div class="loading">加载中...</div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
